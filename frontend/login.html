<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DenimTrack Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">

    <div class="login-box">

<div class="logo-area">

    <img
        src="img/logo.png"
        alt="DenimTrack"
    >

</div>

            <form id="loginForm">

                <input
                    type="text"
                    id="nome"
                    placeholder="Nome"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="E-mail"
                    required
                >

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required
                >

                <select id="nivel">

                      <option value="funcionario">
                           Funcionário
                       </option>

                       <option value="supervisor">
                           Supervisor
                       </option>

                       <option value="admin">
                           Administrador
                       </option>

                </select>

                <button type="submit">
                    Entrar
                </button>

                <button
                    type="button"
                    id="btnCadastro"
                >
                    Cadastrar
                </button>

            </form>

            <p id="mensagem"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
