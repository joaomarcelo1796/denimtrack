<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processos - DenimTrack</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">

        <aside class="sidebar">

            <div class="logo-sidebar">

              <img
                  src="img/logo.png"
                  alt="DenimTrack"
              >

          </div>

            <ul>
                <li onclick="window.location.href='dashboard.html'">
                    Dashboard
               </li>

               <li onclick="window.location.href='processos.html'">
                   Processos
               </li>

               <li onclick="logout()">
                   Sair
               </li>
            </ul>

        </aside>

        <main class="content">

            <h1>Novo Processo</h1>

            <form id="processoForm" class="form-processo">

                <input
                    type="text"
                    id="cliente"
                    placeholder="Nome do Cliente"
                    required
                >

                <input
                    type="number"
                    id="quantidade"
                    placeholder="Quantidade de peças"
                    required
                >

                <input
                    type="text"
                    id="tipo_lavagem"
                    placeholder="Tipo de lavagem"
                    required
                >

                <input
                    type="date"
                    id="prazo_entrega"
                    required
                >

                <button type="submit">
                    Cadastrar Processo
                </button>

            </form>

            <p id="mensagem"></p>

        </main>

    </div>

    <script src="processos.js"></script>

<script>

function logout() {

    localStorage.removeItem("token");

    window.location.href = "login.html";

}

</script>

</body>
</html>
