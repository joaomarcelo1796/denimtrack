<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard DenimTrack</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">

        <aside class="sidebar">

    <div class="logo-sidebar">

        <img
            src="img/logo.png"
            alt="DenimTrack"
        >

    </div>

            <ul>

                 <li onclick="window.location.href='dashboard.html'">
                     Dashboard
                 </li>

                 <li onclick="window.location.href='processos.html'">
                     Processos
                 </li>

                 <li onclick="logout()">
                     Sair
                 </li>

            </ul>

        </aside>

        <main class="content">

            <h1>Dashboard</h1>

                <div class="cards">

                   <div class="card">
                      <h3>Processos Ativos</h3>
                      <p id="ativos">0</p>
                  </div>

                  <div class="card">
                     <h3>Concluídos</h3>
                     <p id="concluidos">0</p>
                 </div>

                 <div class="card">
                    <h3>Total</h3>
                    <p id="total">0</p>
                 </div>

            </div>
            
            <div class="alertas">

               <h2>Alertas</h2>

               <div id="listaAlertas">

               </div>

            </div>

            <div class="processos">

                <h2>Últimos Processos</h2>

                <table>

                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Status</th>
                            <th>Progresso</th>
                        </tr>
                    </thead>

                    <tbody id="tabelaProcessos">

                    </tbody>

                </table>

            </div>

        </main>

    </div>

 <script src="dashboard.js"></script>

 <script>

function logout() {

    localStorage.removeItem("token");

    window.location.href = "login.html";

}

</script>

</body>
</html>
